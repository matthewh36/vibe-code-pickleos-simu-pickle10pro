<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PickleWEB</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />
    <style>
        :root {
            --easing: cubic-bezier(0.4, 0, 0.2, 1);
            --phone-w: 375px;
            --phone-h: 812px;
        }

        body {
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center;
            background: #000; font-family: 'Google Sans', sans-serif; overflow: hidden;
            touch-action: none;
        }

        .phone {
            width: var(--phone-w); height: var(--phone-h);
            background: #1a1a1a url('https://mobileworld.com.vn/uploads/news/09_2025/Pixel_10_BUE_MobileWorld.jpg') center/cover;
            border: 12px solid #222; border-radius: 56px;
            position: relative; overflow: hidden; box-shadow: 0 0 80px rgba(0,0,0,1);
        }

        /* STATUS BAR */
        .status-bar {
            position: absolute; top: 0; width: 100%; height: 40px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 25px; box-sizing: border-box; z-index: 5000; color: white;
        }

        /* APP DRAWER */
        #app-drawer {
            position: absolute; top: 100%; left: 0; width: 100%; height: 100%;
            background: rgba(28, 27, 31, 0.98); backdrop-filter: blur(30px);
            z-index: 3500; transition: transform 0.5s var(--easing);
            padding: 60px 25px; box-sizing: border-box; border-radius: 32px 32px 0 0;
        }
        #app-drawer.open { transform: translateY(-100%); }

        /* HOME SCREEN */
        #home-screen {
            position: relative; height: 100%; z-index: 100;
            padding: 40px 20px; box-sizing: border-box;
            display: flex; flex-direction: column;
            transition: transform 0.5s var(--easing), opacity 0.4s;
        }

        /* WIDGET GIỜ */
        .at-a-glance { color: white; margin-top: 20px; }
        .at-a-glance h2 { font-size: 20px; font-weight: 400; margin: 0; }
        .at-a-glance p { font-size: 44px; font-weight: 500; margin: 5px 0; }

        /* NÚT MỞ APP DRAWER (Vùng ở giữa) */
        .drawer-handle {
            flex: 1; display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: rgba(255,255,255,0.5);
        }

        /* DOCK & GOOGLE SEARCH */
        .bottom-area { margin-top: auto; padding-bottom: 20px; }
        
        .google-search {
            background: rgba(255, 255, 255, 0.25); height: 50px; border-radius: 25px;
            display: flex; align-items: center; padding: 0 18px; margin-top: 15px;
            backdrop-filter: blur(15px); color: white; border: 1px solid rgba(255,255,255,0.1);
        }

        .dock { display: flex; justify-content: space-around; margin-bottom: 5px; }
        .icon { 
            width: 62px; height: 62px; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            background: rgba(255,255,255,0.2); color: white; cursor: pointer;
        }

        /* APP OVERLAY */
        #app-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: calc(100% - 56px);
            z-index: 4000; display: none; transform-origin: center center;
            background: #000;
        }
        
        .anim-opening { animation: zoomIn 0.5s forwards var(--easing); }
        .anim-closing { animation: zoomOut 0.5s forwards var(--easing); }

        @keyframes zoomIn {
            from { opacity: 0; transform: translate(var(--sx), var(--sy)) scale(0.1); border-radius: 100px; }
            to { opacity: 1; transform: translate(0,0) scale(1); border-radius: 0; }
        }
        @keyframes zoomOut {
            from { opacity: 1; transform: translate(0,0) scale(1); border-radius: 0; }
            to { opacity: 0; transform: translate(var(--sx), var(--sy)) scale(0.1); border-radius: 100px; }
        }

        /* NAV BAR */
        .nav-bar {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 56px;
            display: flex; justify-content: space-around; align-items: center; z-index: 6000;
        }
        .nav-btn { width: 60px; height: 50px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .back-s { width: 0; height: 0; border-top: 8px solid transparent; border-bottom: 8px solid transparent; border-right: 14px solid white; }
        .home-s { width: 16px; height: 16px; background: white; border-radius: 50%; box-shadow: 0 0 0 4px rgba(255,255,255,0.3); }
        .recent-s { width: 14px; height: 14px; background: white; border-radius: 2px; }
    </style>
</head>
<body>

<div class="phone" id="phoneBody">
    <div class="status-bar">
        <span id="clock">20:22</span>
        <div style="display:flex; gap:6px;"><span class="material-symbols-rounded" style="font-size:18px">5g</span><span class="material-symbols-rounded" style="font-size:18px">battery_full</span></div>
    </div>

    <div id="app-drawer">
        <div style="background:rgba(255,255,255,0.1); padding:15px; border-radius:20px; color:white; margin-bottom:30px; display:flex; align-items:center;">
            <span class="material-symbols-rounded" style="margin-right:10px">search</span> Tìm kiếm ứng dụng...
        </div>
        <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:20px;">
            <div class="app-item" style="text-align:center" onclick="openApp(this, 'Settings', '#2b2930', '#fff')">
                <div class="icon" style="margin:0 auto"><span class="material-symbols-rounded">settings</span></div>
                <div style="color:white; font-size:12px; margin-top:5px">Cài đặt</div>
            </div>
            <div class="app-item" style="text-align:center" onclick="openApp(this, 'YouTube', '#fff', '#ff0000')">
                <div class="icon" style="margin:0 auto; background:#fff"><span class="material-symbols-rounded" style="color:red">play_circle</span></div>
                <div style="color:white; font-size:12px; margin-top:5px">YouTube</div>
            </div>
        </div>
        <div style="position:absolute; bottom:80px; left:50%; transform:translateX(-50%); color:white; cursor:pointer;" onclick="toggleDrawer(false)">&#9660;</div>
    </div>

    <div id="home-screen">
        <div class="at-a-glance">
            <h2>Monday, Mar 30</h2>
            <p>20°C</p>
        </div>

        <div class="drawer-handle" onclick="toggleDrawer(true)">
            <span class="material-symbols-rounded" style="font-size:40px">expand_less</span>
        </div>

        <div class="bottom-area">
            <div class="dock">
                <div class="icon" onclick="openApp(this, 'Phone', '#1c1b20', '#D2E3FC')"><span class="material-symbols-rounded">call</span></div>
                <div class="icon" onclick="openApp(this, 'Messages', '#1c1b20', '#D2E3FC')"><span class="material-symbols-rounded">chat</span></div>
                <div class="icon" onclick="openApp(this, 'Chrome', '#fff', '#4285f4')"><span class="material-symbols-rounded" style="color:#4285f4">language</span></div>
                <div class="icon" onclick="openApp(this, 'Camera', '#000', '#fff')"><span class="material-symbols-rounded">photo_camera</span></div>
            </div>
            <div class="google-search">
                <span style="color:#4285f4; font-weight:700; font-size:20px; margin-right:12px">G</span>
                <span style="flex:1; opacity:0.6; font-size:14px">Search...</span>
                <span class="material-symbols-rounded">mic</span>
                <span class="material-symbols-rounded" style="margin-left:10px">lens_blur</span>
            </div>
        </div>
    </div>

    <div id="app-overlay">
        <div style="text-align:center; padding-top:160px; color:white;">
            <div id="app-icon-big" style="font-size:100px; margin-bottom:20px;"></div>
            <h1 id="app-title" style="font-size:32px; margin:0;">App</h1>
            <p style="opacity:0.5; margin-top:10px;">Pixel Experience</p>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-btn" onclick="goHome()"><div class="back-s"></div></div>
        <div class="nav-btn" onclick="goHome()"><div class="home-s"></div></div>
        <div class="nav-btn"><div class="recent-s"></div></div>
    </div>
</div>

<script>
    const overlay = document.getElementById('app-overlay');
    const home = document.getElementById('home-screen');
    const drawer = document.getElementById('app-drawer');
    let startY = 0;

    // Vuốt để mở/đóng drawer
    document.addEventListener('touchstart', e => startY = e.touches[0].clientY);
    document.addEventListener('touchend', e => {
        let endY = e.changedTouches[0].clientY;
        if (startY - endY > 80) toggleDrawer(true);
        if (endY - startY > 80) toggleDrawer(false);
    });

    function toggleDrawer(open) {
        if (open) drawer.classList.add('open');
        else drawer.classList.remove('open');
    }

    function openApp(el, name, color, iconColor) {
        const r = el.getBoundingClientRect();
        const p = document.getElementById('phoneBody').getBoundingClientRect();
        const sx = `${(r.left + r.width/2) - (p.left + p.width/2)}px`;
        const sy = `${(r.top + r.height/2) - (p.top + p.height/2)}px`;

        overlay.style.setProperty('--sx', sx);
        overlay.style.setProperty('--sy', sy);
        overlay.style.backgroundColor = color;
        
        document.getElementById('app-title').innerText = name;
        document.getElementById('app-title').style.color = (color === '#fff') ? '#000' : '#fff';
        document.getElementById('app-icon-big').innerHTML = `<span class="material-symbols-rounded" style="font-size:100px; color:${iconColor}">${el.querySelector('span').innerText}</span>`;

        overlay.style.display = 'block';
        overlay.classList.remove('anim-closing');
        overlay.classList.add('anim-opening');
        home.style.opacity = '0';
        home.style.transform = 'scale(0.9) blur(10px)';
    }

    function goHome() {
        if (overlay.style.display === 'block') {
            overlay.classList.remove('anim-opening');
            overlay.classList.add('anim-closing');
            setTimeout(() => { overlay.style.display = 'none'; }, 450);
        }
        home.style.opacity = '1';
        home.style.transform = 'scale(1) blur(0px)';
        drawer.classList.remove('open');
    }

    setInterval(() => {
        const d = new Date();
        document.getElementById('clock').innerText = d.getHours().toString().padStart(2, '0') + ":" + d.getMinutes().toString().padStart(2, '0');
    }, 1000);
</script>
</body>
</html>
