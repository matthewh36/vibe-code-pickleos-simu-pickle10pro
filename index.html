<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel 10 Pro - Final Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />
    <style>
        :root {
            --easing: cubic-bezier(0.1, 0, 0, 1);
            --phone-w: 375px;
            --phone-h: 812px;
            --accent: #D2E3FC;
        }

        body {
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center;
            background: #000; font-family: 'Google Sans', sans-serif; overflow: hidden;
        }

        .phone {
            width: var(--phone-w); height: var(--phone-h);
            /* Dùng ảnh nền tối màu chuẩn */
            background: #000 url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1000') center/cover;
            border: 12px solid #222; border-radius: 56px;
            position: relative; overflow: hidden; box-shadow: 0 0 80px rgba(0,0,0,1);
        }

        /* STATUS BAR */
        .status-bar {
            position: absolute; top: 0; width: 100%; height: 40px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 28px; box-sizing: border-box; z-index: 2000; color: white; font-size: 14px; cursor: pointer;
        }

        /* CONTROL CENTER */
        #control-center {
            position: absolute; top: -110%; left: 0; width: 100%; height: 95%;
            background: rgba(20, 20, 22, 0.98); z-index: 2500; border-radius: 0 0 40px 40px;
            transition: top 0.4s var(--easing); padding: 60px 20px; box-sizing: border-box; color: white;
            backdrop-filter: blur(25px);
        }
        #control-center.open { top: 0; }
        .cc-tile { background: #2b2930; height: 64px; border-radius: 20px; display: flex; align-items: center; padding: 0 16px; gap: 12px; margin-bottom: 12px; }
        .cc-tile.active { background: var(--accent); color: #041e49; }

        /* MÀN HÌNH CHÍNH */
        .home-screen {
            height: 100%; padding: 40px 25px; box-sizing: border-box;
            transition: transform 0.6s var(--easing), opacity 0.5s;
            display: flex; flex-direction: column;
        }

        /* AT A GLANCE */
        .at-a-glance { color: white; margin-top: 20px; }
        .at-a-glance h2 { font-size: 20px; font-weight: 400; margin: 0; }
        .at-a-glance p { font-size: 36px; font-weight: 500; margin: 5px 0; }

        /* SEARCH BAR */
        .search-bar {
            background: rgba(255, 255, 255, 0.2); height: 52px; border-radius: 26px;
            display: flex; align-items: center; padding: 0 18px; margin-top: auto; margin-bottom: 25px;
            backdrop-filter: blur(15px); color: white; border: 1px solid rgba(255,255,255,0.1);
        }

        /* DOCK */
        .dock { display: flex; justify-content: space-around; margin-bottom: 75px; }
        .icon { 
            width: 60px; height: 60px; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; cursor: pointer;
            background: rgba(255, 255, 255, 0.2); color: white; backdrop-filter: blur(10px);
            transition: transform 0.2s;
        }
        .icon:active { transform: scale(0.9); }

        /* APP OVERLAY */
        #app-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: calc(100% - 56px);
            background: #000; z-index: 1500; display: none; transform-origin: center center;
            color: white; overflow: hidden;
        }

        /* THANH 3 NÚT CHUẨN PIXEL */
        .nav-bar {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 56px;
            background: rgba(0,0,0,0.2); backdrop-filter: blur(5px);
            display: flex; justify-content: space-around; align-items: center; z-index: 3000;
        }
        .nav-btn { width: 50px; height: 50px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .back-icon { width: 0; height: 0; border-top: 8px solid transparent; border-bottom: 8px solid transparent; border-right: 14px solid #fff; }
        .home-icon { width: 16px; height: 16px; background: #fff; border-radius: 50%; box-shadow: 0 0 0 4px rgba(255,255,255,0.3); }
        .recent-icon { width: 14px; height: 14px; background: #fff; border-radius: 2px; }

        @keyframes openApp {
            from { opacity: 0; transform: translate(var(--sx), var(--sy)) scale(0.1); border-radius: 100px; }
            to { opacity: 1; transform: translate(0,0) scale(1); border-radius: 0; }
        }
        @keyframes closeApp {
            from { opacity: 1; transform: translate(0,0) scale(1); border-radius: 0; }
            to { opacity: 0; transform: translate(var(--sx), var(--sy)) scale(0.1); border-radius: 100px; }
        }
        .anim-open { animation: openApp 0.5s forwards var(--easing); }
        .anim-close { animation: closeApp 0.5s forwards var(--easing); }
    </style>
</head>
<body>

<div class="phone" id="phoneBody">
    <div class="status-bar" onclick="toggleCC()">
        <span id="st-time">20:04</span>
        <div style="display:flex; gap:8px;"><span class="material-symbols-rounded" style="font-size:18px">5g</span><span class="material-symbols-rounded" style="font-size:18px">battery_full</span></div>
    </div>

    <div id="control-center">
        <div style="display:flex; justify-content:space-between; margin-bottom:30px;">
            <span style="font-size:22px;">Quick Settings</span>
            <span class="material-symbols-rounded">settings</span>
        </div>
        <div class="cc-tile active"><span class="material-symbols-rounded">wifi</span> <b>Internet</b></div>
        <div class="cc-tile active"><span class="material-symbols-rounded">bluetooth</span> <b>Bluetooth</b></div>
        <div class="cc-tile"><span class="material-symbols-rounded">flashlight_on</span> <b>Đèn pin</b></div>
        
        <div style="position:absolute; bottom:30px; left:50%; transform:translateX(-50%); font-size:30px; cursor:pointer;" onclick="toggleCC()">&#9650;</div>
    </div>

    <div class="home-screen" id="home">
        <div class="at-a-glance">
            <h2>Monday, Mar 30</h2>
            <p>20°C</p>
            <div style="display:flex; align-items:center; gap:8px; font-size:14px; opacity:0.8;">
                <img src="https://randomuser.me/api/portraits/women/44.jpg" style="width:24px; border-radius:50%"> Sinh nhật sau 2 ngày
            </div>
        </div>

        <div class="search-bar">
            <span style="font-weight:bold; margin-right:15px; color:#4285f4">G</span>
            <span style="flex:1; opacity:0.6;">Tìm kiếm...</span>
            <span class="material-symbols-rounded">mic</span>
        </div>

        <div class="dock">
            <div class="icon" onclick="launchApp(this, 'Điện thoại', 'call', '#1c1b20', '#D2E3FC')"><span class="material-symbols-rounded">call</span></div>
            <div class="icon" onclick="launchApp(this, 'Tin nhắn', 'chat', '#1c1b20', '#D2E3FC')"><span class="material-symbols-rounded">chat</span></div>
            <div class="icon" id="chrome-btn" onclick="launchApp(this, 'Chrome', 'language', '#fff', '#4285f4')"><span class="material-symbols-rounded">language</span></div>
            <div class="icon" onclick="launchApp(this, 'Máy ảnh', 'photo_camera', '#000', '#fff')"><span class="material-symbols-rounded">photo_camera</span></div>
        </div>
    </div>

    <div id="app-overlay">
        <div style="text-align:center; padding-top:160px;">
            <div id="app-icon-big" style="font-size:100px"></div>
            <h1 id="app-name-big" style="color: inherit; font-size: 32px;">App</h1>
            <p id="app-desc" style="opacity:0.6;">Đang tải dữ liệu...</p>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-btn" onclick="closeApp()"><div class="back-icon"></div></div> 
        <div class="nav-btn" onclick="closeApp()"><div class="home-icon"></div></div> 
        <div class="nav-btn"><div class="recent-icon"></div></div> 
    </div>
</div>

<script>
    const overlay = document.getElementById('app-overlay');
    const home = document.getElementById('home');
    const cc = document.getElementById('control-center');
    let lastPos = { x: 0, y: 0 };

    function launchApp(el, name, icon, color, iconColor) {
        document.getElementById('app-name-big').innerText = name;
        document.getElementById('app-name-big').style.color = (color === '#fff') ? '#000' : '#fff';
        document.getElementById('app-desc').style.color = (color === '#fff') ? '#333' : '#ccc';
        document.getElementById('app-icon-big').innerHTML = `<span class="material-symbols-rounded" style="font-size:110px; color:${iconColor}">${icon}</span>`;
        overlay.style.backgroundColor = color;

        const r = el.getBoundingClientRect();
        const p = document.getElementById('phoneBody').getBoundingClientRect();
        lastPos.x = `${(r.left + r.width/2) - (p.left + p.width/2)}px`;
        lastPos.y = `${(r.top + r.height/2) - (p.top + p.height/2)}px`;

        overlay.style.setProperty('--sx', lastPos.x);
        overlay.style.setProperty('--sy', lastPos.y);

        overlay.style.display = 'block';
        overlay.classList.remove('anim-close');
        overlay.classList.add('anim-open');
        home.style.opacity = '0'; 
        home.style.transform = 'scale(0.9) blur(10px)';
    }

    function closeApp() {
        if(overlay.style.display === 'block') {
            overlay.classList.remove('anim-open');
            overlay.classList.add('anim-close');
            home.style.opacity = '1'; 
            home.style.transform = 'scale(1) blur(0px)';
            setTimeout(() => { overlay.style.display = 'none'; }, 500);
        }
        cc.classList.remove('open');
    }

    function toggleCC() { cc.classList.toggle('open'); }

    // Cập nhật giờ thực tế
    setInterval(() => {
        const d = new Date();
        document.getElementById('st-time').innerText = d.getHours().toString().padStart(2, '0') + ":" + d.getMinutes().toString().padStart(2, '0');
    }, 1000);
</script>
</body>
</html>
